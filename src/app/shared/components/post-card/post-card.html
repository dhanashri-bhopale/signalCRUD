<mat-card class=" h-100 justify-content-between">
        <mat-card-header>
            <h4>{{postobj.title}}</h4>
        </mat-card-header>
        <mat-card-content>
            <p class="text-muted">{{postobj.content}}</p>
        </mat-card-content>
        <mat-card-actions>
            <button [routerLink]="postobj.id" matButton="elevated">View More...</button>
        </mat-card-actions>
    </mat-card>
